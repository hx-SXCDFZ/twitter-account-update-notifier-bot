name: probiusofficial-x-reply-notifier

services:
  notifier:
    build:
      context: .
      args:
        HTTP_PROXY: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
        HTTPS_PROXY: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
        ALL_PROXY: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
        http_proxy: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
        https_proxy: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
        all_proxy: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
      extra_hosts:
        - host.docker.internal:host-gateway
    env_file:
      - .env
    environment:
      HTTP_PROXY: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
      HTTPS_PROXY: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
      ALL_PROXY: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
      http_proxy: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
      https_proxy: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
      all_proxy: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
      NO_PROXY: localhost,127.0.0.1,::1
      no_proxy: localhost,127.0.0.1,::1
      CHROME_BINARY: /usr/bin/chromium
      CHROME_HEADLESS: "true"
      CHROME_NO_SANDBOX: "true"
      CHROME_DISABLE_DEV_SHM_USAGE: "true"
      CHROME_PROXY_SERVER: ${HOST_PROXY_URL:-http://host.docker.internal:7890}
      CHROME_USER_DATA_DIR: ""
      CHROME_PROFILE_DIRECTORY: ""
      ENABLE_BEEP: "false"
      STATE_FILE: /app/state/last_seen.json
      LOG_FILE: /app/logs/docker-monitor.log
      DIAGNOSTICS_DIR: /app/diagnostics
      DIAGNOSTICS_INTERVAL_SECONDS: ${DIAGNOSTICS_INTERVAL_SECONDS:-300}
      DIAGNOSTICS_HTML_MAX_CHARS: ${DIAGNOSTICS_HTML_MAX_CHARS:-500000}
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
      - ./diagnostics:/app/diagnostics
    extra_hosts:
      - host.docker.internal:host-gateway
    shm_size: "1gb"
    restart: unless-stopped
